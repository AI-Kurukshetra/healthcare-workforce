let active = 'staff';

function render() {
  const role = roles.find(r => r.id === active);
  const total = role.sections.reduce((sum, s) => sum + s.features.length, 0);
  
  document.getElementById('tabs').innerHTML = roles.map(r => `
    <button class="tab${r.id === active ? ' active' : ''}" onclick="setRole('${r.id}')">${r.label}</button>
  `).join('');

  document.getElementById('content').innerHTML = `
    <div class="count">${role.desc} — ${total} features across ${role.sections.length} areas</div>
    ${role.sections.map(s => `
      <div class="section">
        <div class="section-title">${s.title}</div>
        <div class="feature-list">
          ${s.features.map(f => `
            <div class="feature" onclick="window.sendPrompt && sendPrompt('Tell me more about the ${f.name} feature for ${role.label} role')">
              <span class="dot" style="background:${role.dot}"></span>
              <div>
                <div class="feature-name">${f.name}</div>
                <div class="feature-desc">${f.desc}</div>
                <span class="perm ${f.perm}">${f.perm === 'full' ? 'Full Access' : f.perm === 'view' ? 'View Only' : 'Own Data'}</span>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
  `;
}

function setRole(id) { active = id; render(); }
